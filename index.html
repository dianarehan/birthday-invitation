<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7edf1" />
  <title>You're Invited · Diana's Birthday</title>
  <meta name="description" content="You're invited to Diana's birthday." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Great+Vibes&family=Jost:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-stage="intro">

  <!-- Your PinkPantheress clip (rings ~13s, "Hello" drops ~14s) -->
  <audio id="song" src="Music/pinkpantheress_ringotne_song.mp3" preload="auto"></audio>

  <!-- soft floating petals (filled by JS) -->
  <div class="decor" id="decor" aria-hidden="true"></div>

  <!-- ============ STAGE 1 · TAP TO OPEN ============ -->
  <section class="stage stage-intro" id="stage-intro">
    <div class="intro-inner">
      <p class="intro-kicker">you have</p>
      <h1 class="intro-title">an invitation</h1>
      <button class="tap-btn" id="openBtn" type="button">Open</button>
      <p class="intro-hint">sound on &#8226; best with headphones</p>
    </div>
  </section>

  <!-- ============ STAGE 2 · PHONE RINGS ============ -->
  <section class="stage stage-phone" id="stage-phone" aria-hidden="true">
    <div class="phone-hang">
      <!-- ring pulses while it rings -->
      <span class="ring-wave" id="ringWave"></span>
      <!-- your transparent phone image drops in and hangs here -->
      <img class="phone-img" id="phoneImg" src="assets/phone.png" alt="A ringing telephone" />
      <!-- elegant 'Hello' appears exactly on the drop -->
      <span class="hello-word" id="helloWord">Hello&hairsp;?</span>
    </div>
  </section>

  <!-- ============ STAGE 3 · YOU'RE INVITED ============ -->
  <section class="stage stage-invited" id="stage-invited" aria-hidden="true">
    <div class="invited">
      <span class="invited__small">you're</span>
      <span class="invited__big">Invited</span>
      <span class="invited__rule"></span>
    </div>
  </section>

  <!-- ============ STAGE 4 · THE INVITATION ============ -->
  <section class="stage stage-main" id="stage-main" aria-hidden="true">
    <article class="card" id="card">
      <div class="card__inner">
        <p class="card__eyebrow reveal">Happy Birthday</p>
        <h2 class="card__name reveal">Diana</h2>
        <span class="card__rule reveal"></span>

        <div class="card__details reveal">
          <p><span class="lbl">Where</span>Home</p>
          <p><span class="lbl">When</span>17 &middot; 07 &middot; 2026</p>
        </div>

        <div class="card__rules reveal">
          <p class="card__rules-title">the two little rules</p>
          <p>bring a gift</p>
          <p>wear pastel colours</p>
        </div>

        <a class="gift-link reveal" href="gifts.html">Gift ideas &nbsp;&rarr;</a>
      </div>
    </article>

    <button class="sound-toggle" id="soundToggle" type="button" title="Mute / unmute">&#9835;</button>
    <button class="replay" id="replayBtn" type="button" title="Play again">replay</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
