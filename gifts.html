<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf1de" />
  <title>Gift Ideas · Diana's Birthday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Great+Vibes&family=Jost:wght@300;400&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow: auto; }
    body { overflow-x: hidden; }
    .gifts-wrap {
      min-height: 100dvh;
      padding: max(40px, env(safe-area-inset-top)) 22px max(48px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 2;
    }
    .gifts-head { text-align: center; margin-bottom: 2.2em; }
    .gifts-head .script {
      font-family: var(--script); color: var(--accent);
      font-size: clamp(1.8rem, 8.6vw, 2.55rem); display: block;
    }
    .gifts-head h1 {
      font-family: var(--serif); font-weight: 700; font-style: italic;
      font-size: clamp(2.25rem, 10.5vw, 3.35rem);
      letter-spacing: -.015em; line-height: .96; margin: .08em 0 .34em; color: #78503b;
    }
    .gifts-head .rule {
      display: block; width: 72px; height: 1px; margin: .75em auto 0;
      background: var(--accent); opacity: .6;
    }
    .gift-list {
      width: min(92vw, 440px); list-style: none; padding: 0; margin: 0;
      counter-reset: g;
    }
    .gift-list li {
      counter-increment: g;
      position: relative;
      padding: 20px 10px 20px 48px;
      font-family: var(--cormorant); font-weight: 600;
      font-size: clamp(1.26rem, 5.9vw, 1.72rem);
      line-height: 1.16; color: #654130;
      border-bottom: 1px solid rgba(221, 90, 82, .3);
    }
    .gift-list li::before {
      content: counter(g, decimal-leading-zero);
      position: absolute; left: 6px; top: 24px;
      font-family: var(--body); font-weight: 400;
      font-size: .82rem; letter-spacing: .12em; color: var(--accent);
    }
    .gift-list li small {
      display: block; font-family: var(--body); font-weight: 400;
      font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-soft); margin-top: .32em;
    }
    .back-link {
      margin-top: 2.8em; text-decoration: none;
      font-family: var(--body); font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase; font-size: .78rem;
      color: #fff; background: var(--coral);
      padding: .86em 1.95em; border-radius: 999px;
      transition: background .3s;
    }
    .back-link:hover { background: var(--coral-deep); }
    .decor .gift-icon {
      position: absolute;
      width: var(--sz, 26px); height: var(--sz, 26px);
      opacity: var(--op, .18); color: var(--accent);
      filter: blur(.15px);
      animation: floatGlyph var(--dur, 11s) ease-in-out var(--delay, 0s) infinite;
      transform-origin: center;
    }
    .decor .gift-icon svg { width: 100%; height: 100%; display: block; }
    .decor .gift-icon--green { color: #7aa18f; }
    .decor .gift-icon--gold { color: #d5ab62; }
    @keyframes floatGlyph {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(-4deg) scale(.96); }
      50% { transform: translate3d(var(--drift, 10px), -18px, 0) rotate(6deg) scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="decor" id="decor" aria-hidden="true"></div>

  <main class="gifts-wrap">
    <div class="gifts-head">
      <span class="script">a few things she'd love</span>
      <h1>Gift Ideas</h1>
      <span class="rule"></span>
    </div>

    <ul class="gift-list">
      <li>Silver necklaces</li>
      <li>Vanilla scented candle</li>
      <li>Headphones</li>
      <li>Shoulder bag<small>anything but burgundy</small></li>
      <li>Centella Ampoule</li>
      <li>Dr. Baby matcha powder</li>
    </ul>

    <a class="back-link" href="index.html">&larr; Back to invite</a>
  </main>

  <script>
    // soft floating petals to match the invite
    const COLORS = ["var(--pink)","var(--yellow)","var(--coral)","var(--orange)","var(--blue)"];
    const ICONS = [
      `<svg viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor"><circle cx="12" cy="5" r="4"/><circle cx="19" cy="10" r="4"/><circle cx="16.2" cy="18" r="4"/><circle cx="7.8" cy="18" r="4"/><circle cx="5" cy="10" r="4"/></g><circle cx="12" cy="12" r="3" fill="#fff7ef" opacity=".9"/></svg>`,
      `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6.8 7.1c1.9 0 3.8 1.1 5.2 3.2 1.4-2.1 3.3-3.2 5.2-3.2 1.5 0 2.7 1.1 2.7 2.6 0 2.1-2.5 4.3-5.2 5.8l-1.9 1-1.9-1C8.1 14 5.6 11.8 5.6 9.7 5.6 8.2 6.8 7.1 8.3 7.1h-1.5Z"/><path fill="currentColor" d="M10.7 14.6 9.5 20h1.8l.7-3.3h.1l.7 3.3h1.8l-1.2-5.4z"/></svg>`,
      `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 1.8 13.9 8l6.3 1.9-6.3 1.9-1.9 6.4-1.9-6.4-6.3-1.9L10.1 8z"/></svg>`
    ];
    const decor = document.getElementById("decor");
    for (let i = 0; i < 16; i++) {
      const s = document.createElement("span");
      s.className = "petal";
      s.style.left = Math.random()*100 + "vw";
      s.style.setProperty("--sz", 8 + Math.random()*12 + "px");
      s.style.setProperty("--op", 0.2 + Math.random()*0.35);
      s.style.setProperty("--dur", 10 + Math.random()*9 + "s");
      s.style.setProperty("--delay", -Math.random()*12 + "s");
      s.style.setProperty("--drift", (Math.random()*120-60) + "px");
      s.style.setProperty("--c", COLORS[(Math.random()*COLORS.length)|0]);
      decor.appendChild(s);
    }
    for (let i = 0; i < 10; i++) {
      const s = document.createElement("span");
      const edgeLeft = Math.random() < 0.5;
      s.className = "gift-icon " + ["", "gift-icon--green", "gift-icon--gold"][(Math.random()*3)|0];
      s.style.left = (edgeLeft ? 3 + Math.random()*18 : 78 + Math.random()*16) + "vw";
      s.style.top = (8 + Math.random()*82) + "vh";
      s.style.setProperty("--sz", 18 + Math.random()*22 + "px");
      s.style.setProperty("--op", 0.1 + Math.random()*0.15);
      s.style.setProperty("--dur", 8 + Math.random()*8 + "s");
      s.style.setProperty("--delay", -Math.random()*10 + "s");
      s.style.setProperty("--drift", (Math.random()*18 - 9) + "px");
      s.innerHTML = ICONS[(Math.random()*ICONS.length)|0];
      decor.appendChild(s);
    }
  </script>
</body>
</html>
