<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf1de" />
  <title>Gift Ideas · Diana's Birthday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Great+Vibes&family=Jost:wght@300;400&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow: auto; }
    .gifts-wrap {
      min-height: 100dvh;
      padding: max(40px, env(safe-area-inset-top)) 22px max(48px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; align-items: center;
    }
    .gifts-head { text-align: center; margin-bottom: 1.8em; }
    .gifts-head .script {
      font-family: var(--script); color: var(--accent);
      font-size: clamp(1.6rem, 8vw, 2.2rem); display: block;
    }
    .gifts-head h1 {
      font-family: var(--serif); font-weight: 600; font-style: italic;
      font-size: clamp(2rem, 10vw, 3rem); margin: .05em 0 .3em; color: var(--ink);
    }
    .gifts-head .rule {
      display: block; width: 60px; height: 1px; margin: .6em auto 0;
      background: var(--accent); opacity: .6;
    }
    .gift-list {
      width: min(92vw, 440px); list-style: none; padding: 0; margin: 0;
      counter-reset: g;
    }
    .gift-list li {
      counter-increment: g;
      position: relative;
      padding: 18px 6px 18px 44px;
      font-family: var(--cormorant); font-weight: 600;
      font-size: clamp(1.2rem, 5.8vw, 1.6rem);
      color: var(--ink);
      border-bottom: 1px solid rgba(221, 90, 82, .3);
    }
    .gift-list li::before {
      content: counter(g, decimal-leading-zero);
      position: absolute; left: 6px; top: 22px;
      font-family: var(--body); font-weight: 300;
      font-size: .8rem; letter-spacing: .1em; color: var(--accent);
    }
    .gift-list li small {
      display: block; font-family: var(--body); font-weight: 300;
      font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--ink-soft); margin-top: .2em;
    }
    .back-link {
      margin-top: 2.4em; text-decoration: none;
      font-family: var(--body); font-weight: 400;
      letter-spacing: .22em; text-transform: uppercase; font-size: .76rem;
      color: #fff; background: var(--coral);
      padding: .8em 1.8em; border-radius: 999px;
      transition: background .3s;
    }
    .back-link:hover { background: var(--coral-deep); }
  </style>
</head>
<body>
  <div class="decor" id="decor" aria-hidden="true"></div>

  <main class="gifts-wrap">
    <div class="gifts-head">
      <span class="script">a few things she'd love</span>
      <h1>Gift Ideas</h1>
      <span class="rule"></span>
    </div>

    <ul class="gift-list">
      <li>Silver necklaces</li>
      <li>Vanilla scented candle</li>
      <li>Headphones</li>
      <li>Shoulder bag<small>anything but burgundy</small></li>
      <li>Centella Ampoule</li>
      <li>Dr. Baby matcha powder</li>
    </ul>

    <a class="back-link" href="index.html">&larr; Back to invite</a>
  </main>

  <script>
    // soft floating petals to match the invite
    const COLORS = ["var(--pink)","var(--yellow)","var(--coral)","var(--orange)","var(--blue)"];
    const decor = document.getElementById("decor");
    for (let i = 0; i < 16; i++) {
      const s = document.createElement("span");
      s.style.left = Math.random()*100 + "vw";
      s.style.setProperty("--sz", 8 + Math.random()*12 + "px");
      s.style.setProperty("--op", 0.2 + Math.random()*0.35);
      s.style.setProperty("--dur", 10 + Math.random()*9 + "s");
      s.style.setProperty("--delay", -Math.random()*12 + "s");
      s.style.setProperty("--drift", (Math.random()*120-60) + "px");
      s.style.setProperty("--c", COLORS[(Math.random()*COLORS.length)|0]);
      decor.appendChild(s);
    }
  </script>
</body>
</html>
